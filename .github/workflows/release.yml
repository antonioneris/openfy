name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --runInBand
      - run: npm run build

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run electron:build
          - name: Windows
            os: windows-latest
            command: npm run electron:build:win
          - name: Linux
            os: ubuntu-latest
            command: npm run electron:build:linux

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - run: npm ci
      - name: Package application
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: openfy-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: find . -maxdepth 1 -type f -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes --title "OpenFy ${GITHUB_REF_NAME}"
